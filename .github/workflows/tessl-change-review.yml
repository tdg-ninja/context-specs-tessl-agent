name: Tessl change review advisory PR review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr-number:
        description: PR number to review
        required: true
        type: string

concurrency:
  group: tessl-change-review-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs['pr-number'] }}
  cancel-in-progress: ${{ github.event_name != 'issue_comment' }}

jobs:
  tessl-change-review:
    name: Tessl change review advisory PR review
    if: >-
      (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
      (github.event_name != 'issue_comment' ||
       (github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '@tessl-change-review') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR' ||
         github.event.comment.author_association == 'ADMIN')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    env:
      REPO: ${{ github.repository }}
      REVIEW_BASE: origin/${{ github.base_ref || 'main' }}
      REVIEW_ACTION: comment
      REVIEW_OUTPUT: change-review.json
      REVIEW_SKILLS: >-
        tessl/code-review#review-code-legibility
    steps:
      - name: Tessl change review resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR_NUMBER: ${{ github.event.inputs['pr-number'] }}
          COMMENT_PR_NUMBER: ${{ github.event.issue.number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_IS_CROSS_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "issue_comment" ]; then
            if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
              PR_NUMBER="$INPUT_PR_NUMBER"
            else
              PR_NUMBER="$COMMENT_PR_NUMBER"
            fi
            PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid,isCrossRepository,baseRefName)
            HEAD_SHA=$(jq -r .headRefOid <<< "$PR_JSON")
            IS_CROSS_REPOSITORY=$(jq -r .isCrossRepository <<< "$PR_JSON")
            BASE_REF="origin/$(jq -r .baseRefName <<< "$PR_JSON")"
          else
            PR_NUMBER="$EVENT_PR_NUMBER"
            HEAD_SHA="$EVENT_HEAD_SHA"
            IS_CROSS_REPOSITORY="$EVENT_IS_CROSS_REPOSITORY"
            BASE_REF="$REVIEW_BASE"
          fi
          echo "pr-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head-sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "is-cross-repository=$IS_CROSS_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "base-ref=$BASE_REF" >> "$GITHUB_OUTPUT"

      - name: Tessl change review reject fork PRs
        if: steps.pr.outputs.is-cross-repository == 'true'
        run: |
          echo "Refusing to run privileged Tessl change review on a cross-repository PR." >&2
          exit 1

      - name: Tessl change review checkout trusted publisher
        uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}
          path: _workflow
          sparse-checkout: |
            .github/change-review/publish-review.mjs
          persist-credentials: false

      - name: Tessl change review checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head-sha }}
          path: _pr
          fetch-depth: 0
          persist-credentials: false

      - name: Tessl change review automatic run policy
        id: review-policy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "issue_comment" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/reviews" > reviews.json
          COUNT=$(jq -s '[.[][] | select(.user.login == "github-actions[bot]") | select((.body // "") | contains("<!-- tessl-change-review -->"))] | length' reviews.json)
          if [ "$COUNT" -ge 1 ]; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: automatic Tessl change review already ran."
          else
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tessl install CLI for change review
        if: steps.review-policy.outputs.should-run == 'true'
        uses: tesslio/setup-tessl@25ec223fc0da33b41b8044ff5ab2b85235f4f91e # v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Tessl auth check for change review
        if: steps.review-policy.outputs.should-run == 'true'
        working-directory: _pr
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
        run: tessl auth whoami

      - name: Tessl change review run explicit skills
        if: steps.review-policy.outputs.should-run == 'true'
        working-directory: _pr
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
          REVIEW_OUTPUT: ${{ env.REVIEW_OUTPUT }}
          REVIEW_SKILLS: ${{ env.REVIEW_SKILLS }}
          REVIEW_BASE: ${{ steps.pr.outputs.base-ref }}
        run: |
          set -euo pipefail
          read -r -a REVIEW_SKILL_REFS <<< "$REVIEW_SKILLS"
          if [ "${#REVIEW_SKILL_REFS[@]}" -eq 0 ]; then
            echo "::error::REVIEW_SKILLS must include at least one skill"
            exit 1
          fi
          skill_args=()
          for skill in "${REVIEW_SKILL_REFS[@]}"; do
            skill_args+=(--skill "$skill")
          done
          tessl change review \
            --json \
            --output "$REVIEW_OUTPUT" \
            "${skill_args[@]}" \
            --base "$REVIEW_BASE"

      - name: Tessl change review publish advisory PR review
        if: steps.review-policy.outputs.should-run == 'true'
        working-directory: _pr
        env:
          GH_TOKEN: ${{ secrets.DARK_FACTORY_GH_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ env.REPO }}
          PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
          REVIEW_ACTION: ${{ env.REVIEW_ACTION }}
          REVIEW_OUTPUT: ${{ env.REVIEW_OUTPUT }}
          OUT: review-publish.json
        run: node ../_workflow/.github/change-review/publish-review.mjs

      - name: Tessl change review upload artifacts
        if: always() && steps.review-policy.outputs.should-run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tessl-change-review-${{ steps.pr.outputs.head-sha }}
          path: |
            _pr/${{ env.REVIEW_OUTPUT }}
            _pr/review-publish.json
          if-no-files-found: ignore
