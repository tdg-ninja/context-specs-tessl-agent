name: Dark Factory maintenance smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * 1'

concurrency:
  group: dark-factory-maintenance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dark-factory-health:
    name: Dark Factory health report via Tessl agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
      TASK: Inspect the Context Specs Dark Factory setup and report current health before demo. Do not make changes.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tessl CLI
        uses: tesslio/setup-tessl@25ec223fc0da33b41b8044ff5ab2b85235f4f91e # v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Tessl auth check
        run: tessl auth whoami

      - name: Non-Tessl preflight checks
        run: |
          python3 -m py_compile bin/context-specs.py scripts/check-review-records.py scripts/update-review-record.py scripts/validate-github-issue.py
          python3 bin/context-specs.py catalog generate --source .
          python3 scripts/check-review-records.py --root . --min-score 70
          scripts/test-cli.sh
          git diff --check

      - name: Write Dark Factory health prompt file
        run: |
          mkdir -p .tessl/dark-factory
          python3 - <<'PY'
          import os
          from pathlib import Path

          task = os.environ["TASK"]
          Path(".tessl/dark-factory/prompt.md").write_text(f"""You are the Dark Factory maintenance agent for the Context Specs repository.

          Goal: produce a read-only pre-demo health report for the private Tessl plugin cap1-context-specs/context-specs and its Dark Factory workflows.

          Read these files first:
          - docs/dark-factory.md
          - docs/distribution.md
          - docs/evals.md
          - .tessl-plugin/plugin.json
          - tessl.json
          - catalog/skills-manifest.json
          - .github/workflows/validate-catalog.yml
          - .github/workflows/tessl-change-verify.yml
          - .github/workflows/tessl-change-review.yml
          - .github/workflows/tessl-change-risk.yml
          - .github/workflows/dark-factory-issue-dispatch.yml
          - .github/workflows/dark-factory-cloud-issue-dispatch.yml

          Task:
          {task}

          Rules:
          - Do not edit files.
          - Write .tessl/dark-factory/report.md.
          - Make it explicit which parts are Tessl surfaces and which are deterministic local/GitHub glue.
          - Call out any active risks, missing secrets, stale docs, open PRs, open issues, or failed recent workflow categories that would affect a demo.
          - Do not publish registry versions.
          - Do not inline large logs into prompts; save evidence files under .tessl/dark-factory/ if needed.
          """)
          PY

      - name: Tessl Dark Factory health report
        run: |
          tessl agent --print --no-session --permission-mode accept-edits \
            "Read .tessl/dark-factory/prompt.md and produce the requested read-only Dark Factory health report." \
            > .tessl/dark-factory/agent-output.txt < /dev/null
          cat .tessl/dark-factory/agent-output.txt

      - name: Ensure report exists
        run: |
          if [ ! -s .tessl/dark-factory/report.md ]; then
            cp .tessl/dark-factory/agent-output.txt .tessl/dark-factory/report.md
          fi

      - name: Upload Dark Factory health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark-factory-health-report
          path: .tessl/dark-factory/**
          if-no-files-found: ignore
