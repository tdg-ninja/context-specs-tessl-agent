name: Dark Factory issue dispatch

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue-number:
        description: GitHub issue number to dispatch
        required: true
      dry-run:
        description: Analyze and report without editing files
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

concurrency:
  group: dark-factory-issue-${{ github.event.issue.number || inputs['issue-number'] }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dark Factory GitHub issue via Tessl agent
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'dark-factory') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request == null && contains(github.event.comment.body, '/dark-factory'))
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs['issue-number'] }}
      DRY_RUN: ${{ inputs['dry-run'] || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tessl CLI
        uses: tesslio/setup-tessl@25ec223fc0da33b41b8044ff5ab2b85235f4f91e # v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Tessl auth check
        run: tessl auth whoami

      - name: Non-Tessl capture GitHub issue context
        run: |
          set -euo pipefail
          mkdir -p .tessl/dark-factory
          gh issue view "$ISSUE_NUMBER" \
            --json number,title,body,author,labels,comments,url,state \
            > .tessl/dark-factory/issue.json

      - name: Non-Tessl deterministic issue structure validation
        id: issue-structure
        run: |
          set -euo pipefail
          trigger="manual"
          if [ "${{ github.event_name }}" = "issues" ]; then trigger="label"; fi
          if [ "${{ github.event_name }}" = "issue_comment" ]; then trigger="comment"; fi
          python3 scripts/validate-github-issue.py \
            --issue-json .tessl/dark-factory/issue.json \
            --trigger "$trigger" \
            --output .tessl/dark-factory/issue-structure.md

      - name: Tessl issue structure validation
        run: |
          set -euo pipefail
          tessl agent --print --no-session --permission-mode yolo \
            "Read docs/github-issue-contract.md, .tessl/dark-factory/issue.json, and .tessl/dark-factory/issue-structure.md. Validate whether this GitHub issue is a dispatchable Dark Factory work order. Write .tessl/dark-factory/tessl-issue-validation.json with keys valid(boolean), missing(array), reasoning(string), and write a concise markdown report to .tessl/dark-factory/tessl-issue-validation.md. Do not edit repo source files." \
            > .tessl/dark-factory/tessl-issue-validation-output.txt < /dev/null
          cat .tessl/dark-factory/tessl-issue-validation-output.txt

      - name: Non-Tessl combine issue validation decisions
        id: validation-decision
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          deterministic_valid = os.environ.get('DETERMINISTIC_VALID') == 'true'
          tessl_path = Path('.tessl/dark-factory/tessl-issue-validation.json')
          tessl_valid = False
          if tessl_path.exists():
              try:
                  tessl_valid = json.loads(tessl_path.read_text()).get('valid') is True
              except json.JSONDecodeError:
                  tessl_valid = False
          else:
              # Fallback for older agent behavior: treat an explicit positive
              # validation in stdout as the Tessl judgment, while avoiding
              # ambiguous or negative phrasing.
              output_path = Path('.tessl/dark-factory/tessl-issue-validation-output.txt')
              output = output_path.read_text().lower() if output_path.exists() else ''
              positive = 'valid dispatchable' in output or 'valid: **yes**' in output or 'valid: yes' in output
              negative = 'invalid' in output or 'not valid' in output or 'not dispatchable' in output
              tessl_valid = positive and not negative
          valid = deterministic_valid and tessl_valid
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"valid={'true' if valid else 'false'}\n")
          print(f"Deterministic issue validation: {deterministic_valid}")
          print(f"Tessl issue validation: {tessl_valid}")
          print(f"Combined issue validation: {valid}")
          PY
        env:
          DETERMINISTIC_VALID: ${{ steps.issue-structure.outputs.valid }}

      - name: Non-Tessl stop invalid issue dispatch
        if: steps.validation-decision.outputs.valid != 'true'
        run: |
          set -euo pipefail
          cat .tessl/dark-factory/issue-structure.md > .tessl/dark-factory/report.md
          printf '\n## Tessl validation\n\n' >> .tessl/dark-factory/report.md
          if [ -s .tessl/dark-factory/tessl-issue-validation.md ]; then
            cat .tessl/dark-factory/tessl-issue-validation.md >> .tessl/dark-factory/report.md
          else
            cat .tessl/dark-factory/tessl-issue-validation-output.txt >> .tessl/dark-factory/report.md
          fi
          gh issue comment "$ISSUE_NUMBER" --body-file .tessl/dark-factory/report.md
          echo "Issue is not dispatchable yet; commented with validation report."
          exit 0

      - name: Non-Tessl write implementation prompt
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os
          from pathlib import Path

          issue = json.loads(Path('.tessl/dark-factory/issue.json').read_text())
          dry_run = os.environ.get('DRY_RUN', 'false')
          labels = ', '.join(label['name'] for label in issue.get('labels', [])) or '(none)'
          comments = issue.get('comments', [])
          latest_comments = '\n\n'.join(
              f"Comment by {c.get('author', {}).get('login', 'unknown')}:\n{c.get('body', '')}"
              for c in comments[-5:]
          ) or '(none)'
          structure = Path('.tessl/dark-factory/issue-structure.md').read_text()
          tessl_validation = Path('.tessl/dark-factory/tessl-issue-validation-output.txt').read_text()

          Path('.tessl/dark-factory/prompt.md').write_text(f"""You are the Dark Factory issue implementation agent for the Context Specs repository.

          Read .tessl/dark-factory/issue.json for full GitHub issue context.

          GitHub issue: #{issue['number']} — {issue['title']}
          URL: {issue['url']}
          Labels: {labels}
          Dry run: {dry_run}

          Deterministic issue structure validation:
          {structure}

          Tessl issue structure validation:
          {tessl_validation}

          Issue body:
          {issue.get('body') or '(empty)'}

          Recent comments:
          {latest_comments}

          Required behavior:
          - Before making changes, confirm the issue satisfies docs/github-issue-contract.md; if not, write a diagnosis-first report and do not edit repo files.
          - Make it explicit in the final report which steps used Tessl and which were deterministic local checks.
          - If dry run is true, do not edit files; write .tessl/dark-factory/report.md only.
          - If dry run is false, implement the issue with safe repo changes, run relevant checks, and write .tessl/dark-factory/report.md.
          - Keep generated context in files under .tessl/dark-factory/; do not inline large logs into prompts.
          - Do not publish Tessl registry versions from this workflow; use .github/workflows/tessl-registry-publish.yml.
          - If the issue is unclear or unsafe to implement, write a diagnosis-first report and do not fabricate changes.
          """)
          PY

      - name: Non-Tessl create work branch
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          branch="dark-factory/issue-${ISSUE_NUMBER}-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          echo "BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Tessl Dark Factory issue agent run
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            tessl agent --print --no-session --permission-mode accept-edits \
              "Read .tessl/dark-factory/prompt.md and perform the requested GitHub issue dispatch analysis." \
              > .tessl/dark-factory/agent-output.txt < /dev/null
          else
            tessl agent --print --no-session --permission-mode yolo \
              "Read .tessl/dark-factory/prompt.md and perform the requested GitHub issue implementation." \
              > .tessl/dark-factory/agent-output.txt < /dev/null
          fi
          cat .tessl/dark-factory/agent-output.txt

      - name: Non-Tessl post-agent checks
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          python3 -m py_compile bin/context-specs.py scripts/check-review-records.py scripts/update-review-record.py
          python3 bin/context-specs.py catalog generate --source .
          python3 scripts/check-review-records.py --root . --min-score 70
          scripts/test-cli.sh
          git diff --check

      - name: Non-Tessl create pull request for issue implementation
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          if git diff --quiet; then
            gh issue comment "$ISSUE_NUMBER" --body "Dark Factory ran but found no repo changes to propose. See this workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            exit 0
          fi

          git config user.name "dark-factory[bot]"
          git config user.email "dark-factory[bot]@users.noreply.github.com"
          git add -A
          git reset -q -- .tessl/dark-factory .tessl/review-results || true
          git commit -m "Implement issue #$ISSUE_NUMBER via Dark Factory"
          git push origin "$BRANCH"

          if [ ! -s .tessl/dark-factory/report.md ]; then
            cat > .tessl/dark-factory/report.md <<REPORT
          ## Dark Factory issue dispatch

          Implemented GitHub issue #$ISSUE_NUMBER.

          ## What is Tessl here
          - Tessl CLI authenticated with TESSL_TOKEN.
          - Tessl agent performed the implementation step with \`tessl agent --print\`.

          ## Non-Tessl checks
          - Python syntax checks
          - catalog regeneration
          - review-record digest validation
          - local-source CLI smoke test
          - git diff whitespace check
          REPORT
          fi

          gh pr create \
            --title "Implement issue #$ISSUE_NUMBER via Dark Factory" \
            --body-file .tessl/dark-factory/report.md \
            --base main \
            --head "$BRANCH"

          gh issue comment "$ISSUE_NUMBER" --body "Dark Factory opened a PR for this issue: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/pulls?q=head%3A$BRANCH"

      - name: Non-Tessl comment dry-run report on issue
        if: env.DRY_RUN == 'true'
        run: |
          if [ -s .tessl/dark-factory/report.md ]; then
            gh issue comment "$ISSUE_NUMBER" --body-file .tessl/dark-factory/report.md
          else
            gh issue comment "$ISSUE_NUMBER" --body "Dark Factory dry-run completed. See workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi

      - name: Upload Dark Factory issue dispatch artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark-factory-issue-${{ env.ISSUE_NUMBER }}
          path: .tessl/dark-factory/**
          if-no-files-found: ignore
